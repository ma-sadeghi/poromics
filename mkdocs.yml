site_name: "Poromics"
site_url: https://ma-sadeghi.github.io/poromics/
repo_url: https://github.com/ma-sadeghi/poromics/

theme:
  name: material
  logo: assets/logo-old.png
  palette:
    # Palette toggle for light mode
    - primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: darkblue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
  features:
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - navigation.sections
    - navigation.instant
    - content.code.copy

extra_css:
  - stylesheets/extra.css

strict: false

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            backlinks: tree
            docstring_options:
              ignore_init_summary: true
            docstring_section_style: list
            filters: ["!^_"]
            heading_level: 1
            inherited_members: true
            merge_init_into_class: true
            parameter_headings: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            summary: true            
  - mkdocs_matplotlib
  - markdown-exec
  - mkdocs-jupyter:
      theme: light
      execute: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML

docs_dir: docs

nav:
  - Home: "index.md"
  - Getting Started:
    - Installation: "install.md"
    - Quick Start: "getting-started.md"
  - Solvers:
    - Overview: "solvers/index.md"
    - Tortuosity (FD): "solvers/tortuosity-fd.md"
    - Tortuosity (LBM): "solvers/tortuosity-lbm.md"
    - Permeability (LBM): "solvers/permeability-lbm.md"
  - Examples:
    - Overview: "examples/index.md"
    - Diffusion (FD): "examples/diffusion-fd.ipynb"
    - Diffusion (LBM): "examples/diffusion-lbm.ipynb"
    - Flow (LBM): "examples/flow-lbm.ipynb"
  - Reference:
    - API: "reference.md"
    - Simulation API: "simulation.md"
    - Contributing: "contributing.md"
